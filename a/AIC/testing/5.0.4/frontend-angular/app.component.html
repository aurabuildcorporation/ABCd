<div class="wrap">

<h1>AIC SCORE</h1>

<input [(ngModel)]="entity" placeholder="Enter Entity">

<button (click)="analyze()">Analyze</button>

<div *ngIf="result">

<h2>{{result.entity}}</h2>
<h1>{{result.score}} / 1000</h1>
<h3>{{result.grade}}</h3>

<pre>{{result.signals | json}}</pre>

</div>

</div>
