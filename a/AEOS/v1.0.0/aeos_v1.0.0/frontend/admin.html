<!-- frontend/admin.html -->
<!DOCTYPE html>
<html>
<head>
    <title>AEOS Admin Dashboard</title>
</head>
<body>
<h2>AEOS Real-Time Control Panel</h2>

<pre id="output"></pre>

<script>
const ws = new WebSocket("ws://127.0.0.1:8000/ws/admin");

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    document.getElementById("output").textContent = JSON.stringify(data, null, 2);
};
</script>
</body>
</html>
